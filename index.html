<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Audits | Elevate Your Standards</title>
    <!-- Tailwind CSS (Loads styling automatically without needing a separate file) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for typography that matches your design -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white min-h-screen flex items-center">

    <!-- Main Container -->
    <div class="max-w-7xl mx-auto px-6 py-16 lg:px-8 flex flex-col lg:flex-row items-center gap-16">
        
        <!-- Left Side: Text and Buttons -->
        <div class="lg:w-1/2 flex flex-col items-start text-left">
            
            <!-- Trust Badge -->
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-blue-50 text-blue-600 text-sm font-semibold mb-8 border border-blue-100">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                </svg>
                Trusted by 500+ Healthcare Providers
            </div>

            <!-- Main Headline -->
            <h1 class="text-5xl lg:text-6xl font-extrabold text-slate-900 leading-tight tracking-tight mb-6">
                Elevate Your <br />
                <span class="text-[#0284c7]">Clinical Standards</span>
            </h1>

            <!-- Subtitle / Paragraph -->
            <p class="text-lg text-slate-600 mb-10 leading-relaxed max-w-lg">
                Streamline clinical audits, ensure rigorous regulatory compliance, and drive better patient outcomes with our intelligent, interactive auditing platform.
            </p>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                <a href="#" class="inline-flex justify-center items-center px-8 py-3.5 text-base font-semibold text-white bg-[#0284c7] hover:bg-[#0369a1] rounded-full transition-all duration-200 shadow-lg shadow-blue-500/30">
                    Get Started Now
                </a>
                <a href="#" class="inline-flex justify-center items-center px-8 py-3.5 text-base font-semibold text-slate-700 bg-white border-2 border-slate-200 hover:border-slate-300 hover:bg-slate-50 rounded-full transition-all duration-200">
                    Learn More
                </a>
            </div>
            
        </div>

        <!-- Right Side: SVG Graphic (Fixes the broken image issue completely) -->
        <div class="lg:w-1/2 w-full mt-12 lg:mt-0 relative group">
            <!-- Decorative blur behind the graphic -->
            <div class="absolute -inset-4 bg-gradient-to-r from-blue-100 to-teal-50 opacity-70 blur-2xl rounded-full group-hover:opacity-100 transition duration-1000"></div>
            
            <!-- Custom Medical Data / Dashboard SVG Graphic -->
            <div class="relative bg-white border border-slate-100 rounded-3xl p-2 shadow-2xl shadow-slate-200/50 overflow-hidden">
                <svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" class="w-full h-auto rounded-2xl drop-shadow-sm">
                    <!-- Background Soft Gradient -->
                    <defs>
                        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f8fafc" />
                            <stop offset="100%" stop-color="#f1f5f9" />
                        </linearGradient>
                        <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#38bdf8" />
                            <stop offset="100%" stop-color="#0284c7" />
                        </linearGradient>
                        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                            <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#cbd5e1" flood-opacity="0.5"/>
                        </filter>
                    </defs>
                    
                    <!-- SVG Background -->
                    <rect width="100%" height="100%" fill="url(#bg-grad)" />
                    
                    <!-- Abstract Tech Grid -->
                    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
                        <circle cx="15" cy="15" r="1.5" fill="#cbd5e1" />
                    </pattern>
                    <rect width="100%" height="100%" fill="url(#dot-grid)" opacity="0.6"/>

                    <!-- Main Dashboard Window/Card -->
                    <rect x="80" y="60" width="440" height="280" rx="16" fill="#ffffff" filter="url(#shadow)" />
                    
                    <!-- Dashboard Header/Menu Bar -->
                    <rect x="80" y="60" width="440" height="40" rx="16" fill="#f8fafc" />
                    <circle cx="110" cy="80" r="5" fill="#ef4444" />
                    <circle cx="130" cy="80" r="5" fill="#f59e0b" />
                    <circle cx="150" cy="80" r="5" fill="#10b981" />
                    <!-- Search/Address Bar placeholder -->
                    <rect x="220" y="72" width="160" height="16" rx="8" fill="#e2e8f0" />
                    <line x1="80" y1="100" x2="520" y2="100" stroke="#f1f5f9" stroke-width="2" />

                    <!-- Dashboard Sidebar -->
                    <rect x="80" y="100" width="90" height="240" fill="#f8fafc" />
                    <!-- Sidebar Menu Lines -->
                    <rect x="100" y="130" width="50" height="6" rx="3" fill="#cbd5e1" />
                    <rect x="100" y="150" width="40" height="6" rx="3" fill="#cbd5e1" />
                    <rect x="100" y="170" width="45" height="6" rx="3" fill="#cbd5e1" />
                    <rect x="100" y="190" width="35" height="6" rx="3" fill="#cbd5e1" />
                    
                    <!-- Medical Cross / Icon in Sidebar -->
                    <circle cx="125" cy="270" r="20" fill="#e0f2fe" />
                    <path d="M122 260 h6 v5 h5 v6 h-5 v5 h-6 v-5 h-5 v-6 h5 z" fill="#0284c7" />

                    <!-- Main Content Area: Data Trend Line -->
                    <path d="M 200 280 L 260 230 L 320 250 L 390 150 L 480 180" fill="none" stroke="url(#blue-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
                    
                    <!-- Trend Line Data Points -->
                    <circle cx="200" cy="280" r="5" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
                    <circle cx="260" cy="230" r="5" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
                    <circle cx="320" cy="250" r="5" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
                    <circle cx="390" cy="150" r="7" fill="#ffffff" stroke="#0284c7" stroke-width="3" filter="url(#shadow)" />
                    <circle cx="480" cy="180" r="5" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
                    
                    <!-- Floating Audit Statistics Card -->
                    <rect x="230" y="130" width="110" height="70" rx="8" fill="#ffffff" filter="url(#shadow)" />
                    <!-- Mini Bar Chart in Card -->
                    <rect x="245" y="165" width="10" height="20" rx="2" fill="#7dd3fc" />
                    <rect x="265" y="150" width="10" height="35" rx="2" fill="#0284c7" />
                    <rect x="285" y="160" width="10" height="25" rx="2" fill="#38bdf8" />
                    <rect x="305" y="145" width="10" height="40" rx="2" fill="#bae6fd" />

                    <!-- EKG / Vitals Monitor Card (Top Right) -->
                    <rect x="370" y="115" width="120" height="45" rx="8" fill="#ffffff" filter="url(#shadow)" />
                    <path d="M 380 135 L 395 135 L 405 125 L 415 145 L 425 135 L 480 135" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                    
                    <!-- Placeholder Text for Data Insights (Bottom Right) -->
                    <rect x="370" y="270" width="120" height="8" rx="4" fill="#cbd5e1" />
                    <rect x="370" y="290" width="90" height="8" rx="4" fill="#e2e8f0" />
                </svg>
            </div>
        </div>
        
    </div>

</body>
</html>
